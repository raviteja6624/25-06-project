<template>
    <lightning-card title="Sync GitHub Repo's" icon-name="custom:custom63">
        <div class="slds-p-horizontal_medium">
            <lightning-input label="GitHub Username or Org" value={orgOrUser} onchange={handleInput}></lightning-input>
            <lightning-button class="slds-m-top_medium" label="Sync Repositories" onclick={handleSync} variant="brand"></lightning-button>
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner>
            </template>
            
            <template if:true={message}>
                <div class="slds-m-top_medium slds-text-color_success">{message}</div>
            </template>
        </div>
    </lightning-card>
</template>
